server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback - send any unknown route to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tiny cache headers for static assets
    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
