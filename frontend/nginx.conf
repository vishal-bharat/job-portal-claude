server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend container.
    # The frontend uses relative URLs like /api/auth/login, so they hit nginx
    # first and nginx forwards them to the backend service over the Docker
    # network. This means the React bundle never needs to know the public URL.
    location /api/ {
        proxy_pass         http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # SPA fallback - send any unknown route to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Tiny cache headers for static assets
    location ~* \.(?:js|css|svg|png|jpg|jpeg|gif|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }
}
