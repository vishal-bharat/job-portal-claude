# Server
server.port=8080

# Database - override via env vars when running in Docker
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:career_connect}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Wait up to 60s for Postgres to be ready (covers first-boot race in Docker)
spring.datasource.hikari.initialization-fail-timeout=60000
spring.datasource.hikari.connection-timeout=30000

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.defer-datasource-initialization=true

# Seed data
spring.sql.init.mode=always
spring.sql.init.continue-on-error=true

# JWT
app.jwt.secret=ThisIsADemoSecretKeyForGismaCareerConnectChangeInProduction1234567890
app.jwt.expiration-ms=86400000

# Logging
logging.level.org.springframework.security=INFO
